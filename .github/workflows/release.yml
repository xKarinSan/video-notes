name: App release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

defaults:
  run:
    working-directory: vnotes

env:
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  build:
    environment: PRODUCTION
    strategy:
      fail-fast: false
      matrix:
        include:
          # -------- mac --------
          - os: macos-latest
            platform: darwin
            arch: x64
            publish_cmd: npx electron-forge publish --platform=darwin --arch=x64

          - os: macos-latest
            platform: darwin
            arch: arm64
            publish_cmd: npx electron-forge publish --platform=darwin --arch=arm64

          # -------- Windows  --------
          - os: windows-latest
            platform: win32
            arch: x64
            publish_cmd: npx electron-forge publish --platform=win32 --arch=x64

          # -------- Linux DEB--------
          - os: ubuntu-latest
            platform: linux
            arch: x64
            linux_kind: deb
            publish_cmd: npx electron-forge publish --platform=linux --arch=x64

          # -------- Linux RPM --------
          - os: ubuntu-latest
            platform: linux
            arch: x64
            linux_kind: rpm
            publish_cmd: npx electron-forge publish --platform=linux --arch=x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vnotes/package-lock.json

      # Linux toolchain for deb/rpm makers
      - name: linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: all other deps
        run: npm ci

      # ffmpeg for the correct platform and archi
      - name: rebuild ffmpeg-static for target arch
        shell: bash
        run: |
          echo "rebuilding ffmpeg-static for ${{ matrix.platform }} / ${{ matrix.arch }}"
          npm rebuild ffmpeg-static --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} || true

      # production.env
      - name: create production.env
        shell: bash
        run: |
          cat > production.env << 'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOF

      - name: check if production.env exists
        shell: bash
        run: ls -la production.env

      # mac signing
      - name: setup signing keychain (macOS)
        if: runner.os == 'macOS'
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euxo pipefail
          CERT_P12="$RUNNER_TEMP/devid.p12"
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > "$CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          security find-identity -v -p codesigning || true

      - name: publish artefact
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          LINUX_KIND: ${{ matrix.linux_kind }}
        run: |
          # limit linux makers so DEB/RPM jobs don't duplicate outputs
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            if [[ "$LINUX_KIND" == "deb" ]]; then
              export ELECTRON_FORGE_MAKE_TARGETS="@electron-forge/maker-deb"
            elif [[ "$LINUX_KIND" == "rpm" ]]; then
              export ELECTRON_FORGE_MAKE_TARGETS="@electron-forge/maker-rpm"
            fi
          fi

          ${{ matrix.publish_cmd }}
